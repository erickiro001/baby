      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/baby-backend_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/baby-backend_internal_models.HealthRecord'
              type: object
      security:
      - BearerAuth: []
      summary: 添加健康记录
      tags:
      - Health
  /babies/{id}/health/{hid}:
    delete:
      parameters:
      - description: 宝宝 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 健康记录 ID
        in: path
        name: hid
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/baby-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: 删除健康记录
      tags:
      - Health
  /babies/{id}/milestones:
    get:
      parameters:
      - description: 宝宝 ID
        in: path
        name: id
        required: true
