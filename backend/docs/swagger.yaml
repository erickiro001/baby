      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/baby-backend_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/baby-backend_internal_models.CreativeWork'
              type: object
      security:
      - BearerAuth: []
      summary: 添加创意作品
      tags:
      - CreativeWork
  /babies/{id}/works/{wid}:
    delete:
      parameters:
      - description: 宝宝 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 作品 ID
        in: path
        name: wid
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/baby-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: 删除创意作品
      tags:
      - CreativeWork
  /capsules:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/baby-backend_internal_utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/baby-backend_internal_models.Capsule'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 时间胶囊列表
      tags:
